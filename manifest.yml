name: Actualizar manifest de fotos

on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generar manifest.json
        run: |
          python3 - <<'EOF'
          import os, json
          exts = ('.jpg', '.jpeg', '.png', '.webp', '.gif')
          carpeta = 'images'
          archivos = sorted(f for f in os.listdir(carpeta) if f.lower().endswith(exts))
          with open('manifest.json', 'w') as out:
              json.dump(archivos, out, ensure_ascii=False, indent=2)
          EOF

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "Actualizar manifest.json"
          git push
